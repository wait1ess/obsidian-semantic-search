version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: obsidian-rag-backend
    ports:
      - "8000:8000"
    volumes:
      # Vault 挂载（只读）
      - /Users/liuwj77/StorageObsidian:/vault:ro
      # 向量库持久化
      - ./data/chroma:/app/data/chroma
      # 模型缓存
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - OBSIDIAN_VAULT_PATH=/vault
      - CHROMA_PERSIST_DIR=/app/data/chroma
      - EMBEDDING_MODEL=BAAI/bge-m3
      - CHUNK_SIZE=512
      - CHUNK_OVERLAP=50
      - WATCHER_DEBOUNCE_SECONDS=2.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: obsidian-rag-ui
    ports:
      - "8501:8501"
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:8000
    restart: unless-stopped

networks:
  default:
    name: obsidian-rag-network